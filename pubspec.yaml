name: siksha360_task
description: "Siksha360 Fee Payment Flow - A Flutter Clean Architecture application utilizing Riverpod for state management and GoRouter for navigation."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.0
  riverpod_annotation: ^2.3.5
  flutter_svg: ^2.3.0
  slide_to_act: ^2.0.2
  flutter_spinkit: ^5.2.2
  lottie: ^3.4.0
  pdf: ^3.13.0
  path_provider: ^2.1.6
  open_filex: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  assets:
    - assets/mockData.json
    - assets/icons/
    - assets/lottie/
    - assets/screenshots/
